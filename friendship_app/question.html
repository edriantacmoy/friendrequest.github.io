<!doctype html>
<html>
<head>
  <title>Friendship Question</title>
  <script src="https://unpkg.com/vue@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.12.0/dist/supabase.min.js"></script>
  <script src="supabase.js"></script>
  <style>
    body{margin:0;background:#cc6c9c;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial;color:white;text-align:center;}
    .box{background:white;color:black;padding:40px;border-radius:10px;width:300px;}
    img{width:150px;height:150px;object-fit:cover;border-radius:10px;margin-bottom:20px;border:2px solid #444;}
    button{margin:10px;padding:10px 25px;border:none;border-radius:20px;cursor:pointer;font-weight:bold;}
    .yes{background:#ff6aa5;color:white;}
    .no{background:#444;color:white;}
  </style>
</head>
<body>
  <div id="app">
    <div class="box">
      <img src="photo/smile.jpg" alt="cute cat"/>
      <h2>Do you accept my friendship?</h2>
      <button class="yes" @click="goConfirm">YES</button>
      <button class="no" @click="goFinal('No')">NO</button>
    </div>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      methods:{
        async goConfirm(){
          const name = localStorage.getItem('userName');
          const { error } = await supabase.from('friendship_responses').update({ response:'Yes' }).eq('name', name).is('response', null);
          if(error) console.error(error);
          window.location.href='confirm.html';
        },
        async goFinal(choice){
          localStorage.setItem('finalChoice', choice);
          const name = localStorage.getItem('userName');
          const { error } = await supabase.from('friendship_responses').update({ response:choice }).eq('name', name).is('response', null);
          if(error) console.error(error);
          window.location.href = choice==='No'?'no.html':'confirm.html';
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
