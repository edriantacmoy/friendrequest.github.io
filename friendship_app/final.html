<!doctype html>
<html>
<head>
  <title>Friendship Confirmed!</title>
  <style>
    body{margin:0;background:#cc6c9c;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial;text-align:center;color:white;}
    .container{display:flex;flex-direction:column;align-items:center;gap:30px;}
    h1{font-size:48px;font-weight:bold;}
    img{width:300px;height:300px;object-fit:cover;border:3px solid #fff;border-radius:10px;}
  </style>
</head>
<body>
  <div class="container">
    <h1 id="message">YEHEY WE ARE FRIENDS NOW 🎉💖</h1>
    <img src="photo/celebration-confetti.gif" alt="celebration cat"/>
  </div>

  <script>
    const userName = localStorage.getItem("userName") || "Friend";
    const message = document.getElementById("message");
    message.textContent = `YEHEY WE ARE FRIENDS NOW, ${userName}! 🎉💖`;
  </script>
</body>
</html>
