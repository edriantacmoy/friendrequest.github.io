<!doctype html>
<html>
  <head>
    <title>Friendship Confirmed!</title>
    <style>
      body {
        margin: 0;
        background: #cc6c9c;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
        text-align: center;
        color: white;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
      }

      h1 {
        font-size: 48px;
        font-weight: bold;
      }

      .emoji {
        font-size: 60px;
      }

      img {
        width: 300px;
        height: 300px;
        object-fit: cover;
        border: 3px solid #fff;
        border-radius: 10px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1 id="message">YEHEY WE ARE FRIENDS NOW 🎉💖</h1>
      <img src="photo/kitten-hearts.png" alt="celebration cat" />
    </div>

    <script>
      // Get user's name from localStorage
      const userName = localStorage.getItem("userName") || "Friend";
      const message = document.getElementById("message");

      // Update message to include the name
      message.textContent = `YEHEY WE ARE FRIENDS NOW, ${userName}! 🎉💖`;
    </script>
  </body>
</html>
