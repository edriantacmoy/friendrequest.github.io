<!doctype html>
<html>
  <head>
    <title>Friendship Confirmed!</title>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: linear-gradient(
          135deg,
          #cc6c9c 0%,
          #e889b5 50%,
          #ff9fc7 100%
        );
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: "Quicksand", sans-serif;
        text-align: center;
        color: white;
        overflow: hidden;
      }

      canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
        z-index: 10;
        animation: fadeInScale 1s ease-out;
        max-width: 90%;
        padding: 20px;
      }

      /* Mobile Responsive */
      @media (max-width: 768px) {
        h1 {
          font-size: 32px;
        }

        img {
          width: 100%;
          max-width: 300px;
          height: auto;
        }
      }

      @media (max-width: 480px) {
        h1 {
          font-size: 24px;
        }

        img {
          width: 100%;
          max-width: 250px;
          height: auto;
        }
      }

      @media (max-width: 360px) {
        h1 {
          font-size: 20px;
        }

        img {
          width: 100%;
          max-width: 200px;
        }
      }

      @keyframes fadeInScale {
        0% {
          opacity: 0;
          transform: scale(0.3);
        }
        50% {
          transform: scale(1.1);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }

      h1 {
        font-family: "Pacifico", cursive;
        font-size: 52px;
        font-weight: bold;
        text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
        animation: glow 2s ease-in-out infinite;
      }

      @keyframes glow {
        0%,
        100% {
          text-shadow:
            3px 3px 6px rgba(0, 0, 0, 0.3),
            0 0 20px rgba(255, 106, 165, 0.5);
        }
        50% {
          text-shadow:
            3px 3px 6px rgba(0, 0, 0, 0.3),
            0 0 40px rgba(255, 106, 165, 0.8);
        }
      }

      img {
        width: 1000px;
        height: 350px;
        object-fit: cover;
        border: 5px solid white;
        border-radius: 20px;
        box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        animation: dance 2s ease-in-out infinite;
      }

      @keyframes dance {
        0%,
        100% {
          transform: rotate(-3deg) scale(1);
        }
        25% {
          transform: rotate(3deg) scale(1.02);
        }
        50% {
          transform: rotate(-3deg) scale(1);
        }
        75% {
          transform: rotate(3deg) scale(1.02);
        }
      }

      .floating-hearts {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 2;
      }

      .heart {
        position: absolute;
        font-size: 24px;
        opacity: 0;
        animation: floatHeart 4s ease-out forwards;
      }

      @keyframes floatHeart {
        0% {
          opacity: 1;
          transform: translateY(0) scale(0);
        }
        20% {
          transform: translateY(-50px) scale(1);
        }
        100% {
          opacity: 0;
          transform: translateY(-300px) scale(0.5);
        }
      }
    </style>
  </head>

  <body>
    <canvas id="fireworks"></canvas>
    <canvas id="confetti"></canvas>
    <div class="floating-hearts" id="hearts"></div>
    <div class="container">
      <h1 id="message">YEHEY WE ARE FRIENDS NOW 🎉💖</h1>
      <img src="photo/minions.gif" alt="celebration" />
    </div>

    <script>
      // ==================== CELEBRATION MUSIC ====================
      let audioContext;
      let musicStarted = false;

      function initAudio() {
        if (!audioContext) {
          audioContext = new (
            window.AudioContext || window.webkitAudioContext
          )();
        }
        return audioContext;
      }

      function playNote(frequency, startTime, duration, type, volume) {
        const ctx = initAudio();
        const oscillator = ctx.createOscillator();
        const gainNode = ctx.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(ctx.destination);

        oscillator.frequency.value = frequency;
        oscillator.type = type;

        gainNode.gain.setValueAtTime(0, startTime);
        gainNode.gain.linearRampToValueAtTime(volume, startTime + 0.05);
        gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + duration);

        oscillator.start(startTime);
        oscillator.stop(startTime + duration);
      }

      function playCelebrationMelody() {
        const ctx = initAudio();
        const now = ctx.currentTime;
        const tempo = 0.35;

        const notes = {
          C3: 130.81,
          D3: 146.83,
          E3: 164.81,
          F3: 174.61,
          G3: 196.0,
          A3: 220.0,
          B3: 246.94,
          C4: 261.63,
          D4: 293.66,
          E4: 329.63,
          F4: 349.23,
          G4: 392.0,
          A4: 440.0,
          B4: 493.88,
          C5: 523.25,
          D5: 587.33,
          E5: 659.25,
          F5: 698.46,
          G5: 783.99,
          A5: 880.0,
          B5: 987.77,
          C6: 1046.5,
        };

        const melody = [
          { note: "C5", dur: 0.3 },
          { note: "E5", dur: 0.3 },
          { note: "G5", dur: 0.3 },
          { note: "C6", dur: 0.6 },
          { note: "G5", dur: 0.3 },
          { note: "E5", dur: 0.3 },
          { note: "C5", dur: 0.3 },
          { note: "D5", dur: 0.3 },
          { note: "E5", dur: 0.5 },
          { note: "G5", dur: 0.5 },
          { note: "F5", dur: 0.3 },
          { note: "A5", dur: 0.3 },
          { note: "C6", dur: 0.3 },
          { note: "A5", dur: 0.3 },
          { note: "G5", dur: 0.3 },
          { note: "E5", dur: 0.3 },
          { note: "G5", dur: 0.6 },
          { note: "C6", dur: 0.2 },
          { note: "B5", dur: 0.2 },
          { note: "A5", dur: 0.2 },
          { note: "G5", dur: 0.2 },
          { note: "E5", dur: 0.3 },
          { note: "G5", dur: 0.5 },
          { note: "C6", dur: 0.8 },
        ];

        let time = 0;
        melody.forEach((item) => {
          if (notes[item.note]) {
            playNote(
              notes[item.note],
              now + time,
              item.dur * tempo,
              "sine",
              0.12,
            );
            const harmonyNote = item.note.replace("5", "4").replace("6", "5");
            if (notes[harmonyNote]) {
              playNote(
                notes[harmonyNote],
                now + time,
                item.dur * tempo,
                "sine",
                0.06,
              );
            }
          }
          time += item.dur * tempo;
        });

        const bassLine = [
          { note: "C3", dur: 1 },
          { note: "G3", dur: 1 },
          { note: "C3", dur: 1 },
          { note: "G3", dur: 1 },
          { note: "F3", dur: 1 },
          { note: "C3", dur: 1 },
          { note: "G3", dur: 1 },
          { note: "C3", dur: 1 },
        ];

        let bassTime = 0;
        bassLine.forEach((item) => {
          if (notes[item.note]) {
            playNote(
              notes[item.note],
              now + bassTime,
              item.dur * tempo,
              "triangle",
              0.1,
            );
          }
          bassTime += item.dur * tempo;
        });
      }

      function startCelebrationMusic() {
        function playLoop() {
          playCelebrationMelody();
          setTimeout(playLoop, 15000);
        }
        playLoop();
      }

      function startMusic() {
        if (!musicStarted) {
          musicStarted = true;
          startCelebrationMusic();
        }
      }

      window.addEventListener("load", () => {
        setTimeout(startMusic, 500);
      });
      window.addEventListener("click", startMusic, { once: true });
      window.addEventListener("touchstart", startMusic, { once: true });

      // ==================== VISUAL EFFECTS ====================
      const userName = localStorage.getItem("userName") || "Friend";
      const message = document.getElementById("message");
      message.textContent = `YEHEY WE ARE FRIENDS NOW, ${userName}! 🎉💖`;

      function createFloatingHearts() {
        const container = document.getElementById("hearts");
        const hearts = ["💖", "💕", "💗", "❤️", "💝"];
        setInterval(() => {
          const heart = document.createElement("div");
          heart.className = "heart";
          heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
          heart.style.left = Math.random() * 100 + "%";
          heart.style.bottom = "0";
          container.appendChild(heart);
          setTimeout(() => heart.remove(), 4000);
        }, 500);
      }
      createFloatingHearts();

      // Fireworks
      const canvas = document.getElementById("fireworks");
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const fireworks = [];
      const particles = [];

      function random(min, max) {
        return Math.random() * (max - min) + min;
      }

      const colorPalettes = [
        [0, 360],
        [300, 360],
        [180, 240],
        [45, 60],
        [270, 300],
      ];

      class Firework {
        constructor(sx, sy, tx, ty) {
          this.x = sx;
          this.y = sy;
          this.sx = sx;
          this.sy = sy;
          this.tx = tx;
          this.ty = ty;
          this.distanceToTarget = Math.sqrt(
            Math.pow(tx - sx, 2) + Math.pow(ty - sy, 2),
          );
          this.distanceTraveled = 0;
          this.coordinates = [];
          this.coordinateCount = 3;
          while (this.coordinateCount--) {
            this.coordinates.push([this.x, this.y]);
          }
          this.angle = Math.atan2(ty - sy, tx - sx);
          this.speed = 2;
          this.acceleration = 1.05;
          this.brightness = random(50, 70);
          this.hue = random(
            colorPalettes[Math.floor(Math.random() * colorPalettes.length)][0],
            colorPalettes[Math.floor(Math.random() * colorPalettes.length)][1],
          );
        }
        update(index) {
          this.coordinates.pop();
          this.coordinates.unshift([this.x, this.y]);
          this.speed *= this.acceleration;
          const vx = Math.cos(this.angle) * this.speed;
          const vy = Math.sin(this.angle) * this.speed;
          this.distanceTraveled = Math.sqrt(
            Math.pow(this.sx - this.x, 2) + Math.pow(this.sy - this.y, 2),
          );
          if (this.distanceTraveled >= this.distanceToTarget) {
            createParticles(this.tx, this.ty, this.hue);
            fireworks.splice(index, 1);
          } else {
            this.x += vx;
            this.y += vy;
          }
        }
        draw() {
          ctx.beginPath();
          ctx.moveTo(
            this.coordinates[this.coordinates.length - 1][0],
            this.coordinates[this.coordinates.length - 1][1],
          );
          ctx.lineTo(this.x, this.y);
          ctx.strokeStyle =
            "hsl(" + this.hue + ", 100%, " + this.brightness + "%)";
          ctx.lineWidth = 3;
          ctx.stroke();
        }
      }

      class Particle {
        constructor(x, y, hue) {
          this.x = x;
          this.y = y;
          this.coordinates = [];
          this.coordinateCount = 5;
          while (this.coordinateCount--) {
            this.coordinates.push([this.x, this.y]);
          }
          this.angle = random(0, Math.PI * 2);
          this.speed = random(2, 12);
          this.friction = 0.95;
          this.gravity = 0.8;
          this.hue = hue + random(-20, 20);
          this.brightness = random(50, 80);
          this.alpha = 1;
          this.decay = random(0.012, 0.025);
        }
        update(index) {
          this.coordinates.pop();
          this.coordinates.unshift([this.x, this.y]);
          this.speed *= this.friction;
          this.x += Math.cos(this.angle) * this.speed;
          this.y += Math.sin(this.angle) * this.speed + this.gravity;
          this.alpha -= this.decay;
          if (this.alpha <= this.decay) {
            particles.splice(index, 1);
          }
        }
        draw() {
          ctx.beginPath();
          ctx.moveTo(
            this.coordinates[this.coordinates.length - 1][0],
            this.coordinates[this.coordinates.length - 1][1],
          );
          ctx.lineTo(this.x, this.y);
          ctx.strokeStyle =
            "hsla(" +
            this.hue +
            ", 100%, " +
            this.brightness +
            "%, " +
            this.alpha +
            ")";
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      }

      function createParticles(x, y, hue) {
        for (let i = 0; i < 80; i++) {
          particles.push(new Particle(x, y, hue));
        }
      }

      function launchFirework() {
        const startX = random(canvas.width * 0.1, canvas.width * 0.9);
        const targetX = random(canvas.width * 0.1, canvas.width * 0.9);
        const targetY = random(canvas.height * 0.1, canvas.height * 0.5);
        fireworks.push(new Firework(startX, canvas.height, targetX, targetY));
      }

      function loop() {
        requestAnimationFrame(loop);
        ctx.globalCompositeOperation = "destination-out";
        ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = "lighter";

        for (let i = fireworks.length - 1; i >= 0; i--) {
          fireworks[i].draw();
          fireworks[i].update(i);
        }
        for (let j = particles.length - 1; j >= 0; j--) {
          particles[j].draw();
          particles[j].update(j);
        }

        if (Math.random() < 0.12) launchFirework();
        if (Math.random() < 0.08) launchFirework();
        if (Math.random() < 0.05) launchFirework();
      }

      for (let i = 0; i < 5; i++) {
        setTimeout(() => launchFirework(), i * 200);
      }
      loop();

      window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });

      // Confetti
      const confettiCanvas = document.getElementById("confetti");
      const confettiCtx = confettiCanvas.getContext("2d");
      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
      const confettiPieces = [];
      const confettiColors = [
        "#ff6aa5",
        "#ff85c1",
        "#ffd700",
        "#00ff00",
        "#00bfff",
        "#ff4500",
        "#ff1493",
        "#9370db",
        "#00ced1",
        "#ff6347",
      ];
      const confettiShapes = ["rect", "circle", "star"];

      class Confetti {
        constructor() {
          this.x = Math.random() * confettiCanvas.width;
          this.y = -20;
          this.size = random(8, 15);
          this.speedY = random(2, 5);
          this.speedX = random(-3, 3);
          this.color =
            confettiColors[Math.floor(Math.random() * confettiColors.length)];
          this.rotation = random(0, 360);
          this.rotationSpeed = random(-8, 8);
          this.shape =
            confettiShapes[Math.floor(Math.random() * confettiShapes.length)];
          this.opacity = 1;
        }
        update() {
          this.y += this.speedY;
          this.x += this.speedX;
          this.rotation += this.rotationSpeed;
          this.speedX *= 0.99;
          if (this.y > confettiCanvas.height + 20) {
            this.y = -20;
            this.x = Math.random() * confettiCanvas.width;
            this.speedX = random(-3, 3);
          }
        }
        draw() {
          confettiCtx.save();
          confettiCtx.translate(this.x, this.y);
          confettiCtx.rotate((this.rotation * Math.PI) / 180);
          confettiCtx.globalAlpha = this.opacity;
          confettiCtx.fillStyle = this.color;

          if (this.shape === "rect") {
            confettiCtx.fillRect(
              -this.size / 2,
              -this.size / 4,
              this.size,
              this.size / 2,
            );
          } else if (this.shape === "circle") {
            confettiCtx.beginPath();
            confettiCtx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
            confettiCtx.fill();
          } else {
            this.drawStar(confettiCtx, 0, 0, 5, this.size / 2, this.size / 4);
          }
          confettiCtx.restore();
        }
        drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
          let rot = (Math.PI / 2) * 3;
          let x = cx,
            y = cy,
            step = Math.PI / spikes;
          ctx.beginPath();
          ctx.moveTo(cx, cy - outerRadius);
          for (let i = 0; i < spikes; i++) {
            x = cx + Math.cos(rot) * outerRadius;
            y = cy + Math.sin(rot) * outerRadius;
            ctx.lineTo(x, y);
            rot += step;
            x = cx + Math.cos(rot) * innerRadius;
            y = cy + Math.sin(rot) * innerRadius;
            ctx.lineTo(x, y);
            rot += step;
          }
          ctx.lineTo(cx, cy - outerRadius);
          ctx.closePath();
          ctx.fill();
        }
      }

      for (let i = 0; i < 200; i++) {
        const c = new Confetti();
        c.y = Math.random() * confettiCanvas.height;
        confettiPieces.push(c);
      }

      function confettiLoop() {
        confettiCtx.clearRect(
          0,
          0,
          confettiCanvas.width,
          confettiCanvas.height,
        );
        confettiPieces.forEach((piece) => {
          piece.update();
          piece.draw();
        });
        requestAnimationFrame(confettiLoop);
      }
      confettiLoop();

      window.addEventListener("resize", () => {
        confettiCanvas.width = window.innerWidth;
        confettiCanvas.height = window.innerHeight;
      });
    </script>
  </body>
</html>
