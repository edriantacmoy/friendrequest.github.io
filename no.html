<!doctype html>
<html>
  <head>
    <title>No Friendship</title>
    <script src="https://unpkg.com/vue@3"></script>

    <style>
      body {
        margin: 0;
        background: #cc6c9c;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial;
        color: white;
        text-align: center;
      }

      .box {
        background: white;
        color: black;
        padding: 40px;
        border-radius: 10px;
        width: 300px;
      }

      img {
        width: 150px;
        height: 150px;
        object-fit: cover;
        border-radius: 10px;
        margin-bottom: 20px;
        border: 2px solid #444;
      }

      button {
        margin: 10px;
        padding: 10px 25px;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-weight: bold;
      }

      .yes {
        background: #ff6aa5;
        color: white;
      }

      .no {
        background: #444;
        color: white;
      }
    </style>
  </head>

  <body>
    <div id="app">
      <div class="box">
        <img src="photo/crying baby.gif" alt="cute cat" />
        <h2>AYAW MO FRIEND AKO?</h2>

        <button class="no" @click="goQuestion">GUSTO</button>
      </div>
    </div>

    <script src="supabase.js"></script>
    <script>
      const { createApp } = Vue;

      createApp({
        methods: {
          async goFinal(choice) {
            const name = localStorage.getItem("userName");
            localStorage.setItem("finalChoice", choice);

            const { error } = await supabase
              .from("friendship_responses")
              .update({ response: choice })
              .eq("name", name)
              .is("response", null);
            if (error) console.error(error);

            window.location.href = "confirm.html";
          },
          goQuestion() {
            window.location.href = "question.html";
          },
        },
      }).mount("#app");
    </script>
  </body>
</html>
