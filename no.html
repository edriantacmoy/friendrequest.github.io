<!doctype html>
<html>
  <head>
    <title>Friendship Confirmation</title>
    <script src="https://unpkg.com/vue@3"></script>
    <style>
      body {
        margin: 0;
        background: #cc6c9c;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial;
        color: white;
        text-align: center;
      }
      .box {
        background: white;
        color: black;
        padding: 40px;
        border-radius: 10px;
        width: 300px;
      }
      img {
        width: 150px;
        height: 150px;
        object-fit: cover;
        border-radius: 10px;
        margin-bottom: 20px;
        border: 2px solid #444;
      }
      button {
        margin: 10px;
        padding: 10px 25px;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-weight: bold;
      }
      .yes {
        background: #ff6aa5;
        color: white;
      }
      .no {
        background: #444;
        color: white;
      }
    </style>
  </head>

  <body>
    <div id="app">
      <div class="box">
        <img src="photo/kitten-hearts.png" alt="cute cat" />
        <h2>ARE U SURE ABOUT IT? HEHEHE</h2>

        <!-- YES goes to final.html -->
        <button class="yes" @click="goFinal('Yes')">YES</button>

        <!-- NO goes to no.html -->
        <button class="no" @click="goNo('No')">NO</button>
      </div>
    </div>

    <script>
      const { createApp } = Vue;

      createApp({
        methods: {
          goFinal(choice) {
            // Save choice and go to final page
            localStorage.setItem("finalChoice", choice);
            window.location.href = "final.html";
          },
          goNo(choice) {
            // Save choice and go to no.html
            localStorage.setItem("finalChoice", choice);
            window.location.href = "no.html";
          },
        },
      }).mount("#app");
    </script>
  </body>
</html>
