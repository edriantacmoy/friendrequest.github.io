<!doctype html>
<html>
  <head>
    <title>No Friendship</title>
    <script src="https://unpkg.com/vue@3"></script>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Quicksand", sans-serif;
        background: linear-gradient(
          135deg,
          #cc6c9c 0%,
          #e889b5 50%,
          #ff9fc7 100%
        );
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
        text-align: center;
        overflow: hidden;
      }

      .rain {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      .drop {
        position: absolute;
        font-size: 20px;
        opacity: 0.4;
        animation: rain 2s linear infinite;
      }

      @keyframes rain {
        0% {
          transform: translateY(-20px);
          opacity: 0;
        }
        10% {
          opacity: 0.4;
        }
        90% {
          opacity: 0.4;
        }
        100% {
          transform: translateY(100vh);
          opacity: 0;
        }
      }

      .box {
        background: rgba(255, 255, 255, 0.95);
        color: #333;
        padding: 40px;
        border-radius: 30px;
        width: 350px;
        max-width: 90%;
        position: relative;
        z-index: 1;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        animation: shake 0.5s ease-out;
      }

      /* Mobile Responsive */
      @media (max-width: 480px) {
        .box {
          padding: 30px 20px;
        }

        img {
          width: 130px;
          height: 130px;
        }

        h2 {
          font-size: 20px;
          margin-bottom: 20px;
        }

        button {
          padding: 12px 30px;
          font-size: 16px;
        }
      }

      @media (max-width: 360px) {
        .box {
          padding: 25px 15px;
        }

        img {
          width: 110px;
          height: 110px;
        }

        h2 {
          font-size: 18px;
        }

        button {
          padding: 10px 25px;
          font-size: 14px;
        }
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-10px);
        }
        40% {
          transform: translateX(10px);
        }
        60% {
          transform: translateX(-10px);
        }
        80% {
          transform: translateX(10px);
        }
      }

      img {
        width: 160px;
        height: 160px;
        object-fit: cover;
        border-radius: 20px;
        margin-bottom: 25px;
        border: 3px solid #ff9fc7;
        animation: sob 1s ease-in-out infinite;
      }

      @keyframes sob {
        0%,
        100% {
          transform: rotate(0deg);
        }
        25% {
          transform: rotate(-5deg);
        }
        75% {
          transform: rotate(5deg);
        }
      }

      h2 {
        font-family: "Pacifico", cursive;
        font-size: 24px;
        margin-bottom: 25px;
        color: #cc6c9c;
      }

      button {
        padding: 15px 40px;
        border: none;
        border-radius: 50px;
        font-weight: bold;
        font-size: 18px;
        font-family: "Quicksand", sans-serif;
        cursor: pointer;
        background: linear-gradient(45deg, #ff6aa5, #ff85c1);
        color: white;
        transition: all 0.3s ease;
        box-shadow: 0 5px 20px rgba(255, 106, 165, 0.4);
      }

      button:hover {
        transform: translateY(-3px) scale(1.05);
        box-shadow: 0 10px 30px rgba(255, 106, 165, 0.6);
      }

      button:active {
        transform: scale(0.95);
      }
    </style>
  </head>

  <body>
    <div class="rain" id="rain"></div>
    <div id="app">
      <div class="box">
        <img src="photo/crying baby.gif" alt="crying" />
        <h2>Nooo! Please be my friend! 😢</h2>

        <button @click="goQuestion">OK FINE! 💕</button>
      </div>
    </div>

    <script>
      function createRain() {
        const container = document.getElementById("rain");
        const drops = ["💧", "😭", "💦", "💔"];
        for (let i = 0; i < 15; i++) {
          const drop = document.createElement("div");
          drop.className = "drop";
          drop.innerHTML = drops[Math.floor(Math.random() * drops.length)];
          drop.style.left = Math.random() * 100 + "%";
          drop.style.animationDelay = Math.random() * 2 + "s";
          drop.style.animationDuration = 1.5 + Math.random() * 1 + "s";
          container.appendChild(drop);
        }
      }
      createRain();

      const { createApp } = Vue;
      createApp({
        methods: {
          goQuestion() {
            window.location.href = "confirm.html";
          },
        },
      }).mount("#app");
    </script>
  </body>
</html>
