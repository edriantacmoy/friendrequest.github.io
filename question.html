<!doctype html>
<html>
  <head>
    <title>Friendship Question</title>
    <script src="https://unpkg.com/vue@3"></script>

    <style>
      body {
        margin: 0;
        background: #cc6c9c;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial;
        color: white;
        text-align: center;
      }

      .box {
        background: white;
        color: black;
        padding: 40px;
        border-radius: 10px;
        width: 300px;
      }

      button {
        margin: 10px;
        padding: 10px 25px;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-weight: bold;
      }

      .yes {
        background: #ff6aa5;
        color: white;
      }

      .no {
        background: #444;
        color: white;
      }
    </style>
  </head>

  <body>
    <div id="app">
      <div class="box">
        <h2>Do you accept my friendship?</h2>

        <button class="yes" @click="answer('Yes')">YES</button>
        <button class="no" @click="answer('No')">NO</button>
      </div>
    </div>

    <script>
      const { createApp } = Vue;

      createApp({
        methods: {
          answer(choice) {
            alert("You selected: " + choice);
          },
        },
      }).mount("#app");
    </script>
  </body>
</html>
