<!doctype html>
<html>
  <head>
    <title>Friendship Acceptance Form</title>
    <!-- Include Vue.js -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Google Fonts - Quicksand -->
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Google Fonts - Pacifico for special text -->
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Quicksand", sans-serif;
        background: linear-gradient(
          135deg,
          #cc6c9c 0%,
          #e889b5 50%,
          #ff9fc7 100%
        );
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        color: white;
        overflow: hidden;
      }

      /* Floating hearts background */
      .bg-effects {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      .heart {
        position: absolute;
        font-size: 20px;
        opacity: 0.3;
        animation: floatUp 8s linear infinite;
      }

      @keyframes floatUp {
        0% {
          transform: translateY(100vh) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 0.3;
        }
        90% {
          opacity: 0.3;
        }
        100% {
          transform: translateY(-100px) rotate(360deg);
          opacity: 0;
        }
      }

      .container {
        width: 400px;
        max-width: 90%;
        position: relative;
        z-index: 1;
        animation: fadeInScale 0.8s ease-out;
      }

      /* Mobile Responsive */
      @media (max-width: 480px) {
        h1 {
          font-size: 26px;
          margin-bottom: 20px;
        }

        img {
          width: 180px;
          height: 180px;
        }

        .start-btn {
          padding: 12px 40px;
          font-size: 18px;
          margin-top: 20px;
        }
      }

      @media (max-width: 360px) {
        h1 {
          font-size: 22px;
        }

        img {
          width: 150px;
          height: 150px;
        }
      }

      @keyframes fadeInScale {
        0% {
          opacity: 0;
          transform: scale(0.8);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }

      h1 {
        font-family: "Pacifico", cursive;
        font-size: 32px;
        margin-bottom: 30px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        animation: bounce 2s ease-in-out infinite;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      .img-container {
        position: relative;
        display: inline-block;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }

      img {
        width: 220px;
        height: 220px;
        object-fit: cover;
        border-radius: 20px;
        border: 4px solid white;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }

      .start-btn {
        margin-top: 30px;
        padding: 15px 50px;
        border: none;
        border-radius: 50px;
        background: linear-gradient(45deg, #ff6aa5, #ff85c1);
        font-weight: bold;
        font-size: 20px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 5px 20px rgba(255, 106, 165, 0.4);
        color: white;
      }

      .start-btn:hover {
        transform: translateY(-3px) scale(1.05);
        box-shadow: 0 10px 30px rgba(255, 106, 165, 0.6);
      }

      .start-btn:active {
        transform: translateY(0) scale(0.98);
      }
    </style>
  </head>

  <body>
    <div class="bg-effects" id="hearts"></div>
    <div id="app" class="container">
      <h1>Friendship Request 💕</h1>

      <div class="img-container">
        <img src="photo/dog.png" alt="cute dog" />
      </div>

      <br />

      <button class="start-btn" @click="startForm">START</button>
    </div>

    <script>
      // Create floating hearts
      function createHearts() {
        const container = document.getElementById("hearts");
        const hearts = ["💖", "💕", "💗", "💝", "❤️"];

        for (let i = 0; i < 15; i++) {
          const heart = document.createElement("div");
          heart.className = "heart";
          heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
          heart.style.left = Math.random() * 100 + "%";
          heart.style.animationDelay = Math.random() * 8 + "s";
          heart.style.animationDuration = 6 + Math.random() * 4 + "s";
          container.appendChild(heart);
        }
      }

      createHearts();

      const { createApp } = Vue;

      createApp({
        methods: {
          startForm() {
            window.location.href = "name.html";
          },
        },
      }).mount("#app");
    </script>
  </body>
</html>
