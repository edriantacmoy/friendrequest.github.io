<!doctype html>
<html>
  <head>
    <title>Friendship Acceptance Form</title>
    <script src="photo/kitten-hearts.png"></script>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #cc6c9c;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        color: white;
      }

      .container {
        width: 400px;
      }

      h1 {
        font-size: 22px;
        margin-bottom: 20px;
      }

      img {
        width: 220px;
        height: 220px;
        object-fit: cover;
        border-radius: 5px;
        border: 2px solid #444;
      }

      .start-btn {
        margin-top: 20px;
        padding: 10px 40px;
        border: none;
        border-radius: 25px;
        background: #dcdcdc;
        font-weight: bold;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
      }

      .start-btn:hover {
        transform: scale(1.1);
        background: white;
      }
    </style>
  </head>

  <body>
    <div id="app" class="container">
      <h1>FRIENDSHIP ACCEPTANCE FORM</h1>

      <img src="cat.png" alt="cat" />

      <br />

      <button class="start-btn" @click="startForm">START</button>
    </div>

    <script>
      const { createApp } = Vue;

      createApp({
        methods: {
          startForm() {
            window.location.href = "question.html";
          },
        },
      }).mount("#app");
    </script>
  </body>
</html>
